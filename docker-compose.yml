version: '3.8'

services:
  livepulse-connector-tiktok:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livepulse-connector-tiktok
    ports:
      - "23012:23012"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos-host:8848
      - NACOS_NAMESPACE=
      - NACOS_GROUP=DEFAULT_GROUP
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - livepulse-network

networks:
  livepulse-network:
    external: true
